      /*
      Explanation regarding that, overlaoding and mimicing overloading 
    JavaScript doesn't support function overloading in the same way that languages like Java or C++ do. With function declarations, hoisting allows later declarations to override earlier ones, which some might (mis)use to mimic overloading. However, using function expressions (or arrow functions) prevents hoisting and also prevents you from declaring two variables with the same name in the same scope.

If you try to declare:

const p1 = (a) => {
console.log(a);
};
const p1 = (a, b) => {
console.log(a, b);
};
You'll get an error (Cannot redeclare block-scoped variable 'p1') because you're attempting to redeclare the same variable name.

Since JavaScript doesn't have built-in support for multiple signatures for a function, here are a few common workarounds:

Single Function with Conditional Behavior
Write one function that checks the number or types of arguments and behaves differently based on that, for example:
function p1(...args) {
if (args.length === 1) {
console.log('One argument:', args[0]);
} else if (args.length === 2) {
console.log('Two arguments:', args[0], args[1]);
} else {
console.log('Arguments:', args);
}
}

p1(5);       // One argument: 5
p1(5, 10);   // Two arguments: 5 10
Separate Functions with Different Names
Instead of overloading a single function name, you can define multiple functions with distinct names reflecting their functionality:
const p1Single = (a) => {
console.log(a);
};

const p1Double = (a, b) => {
console.log(a, b);
};

p1Single(5);       // 5
p1Double(5, 10);   // 5 10
Using an Object With Methods
Group related overload-like behaviors in object methods or use a configuration object. This makes the intentions clear without needing literal overloading.
const p1 = {
single: (a) => {
console.log(a);
},
double: (a, b) => {
console.log(a, b);
}
};

p1.single(5);      // 5
p1.double(5, 10);  // 5 10
By employing one of these strategies, you can simulate overloading-like behavior without running into issues with hoisting or redeclaration errors.
    */
