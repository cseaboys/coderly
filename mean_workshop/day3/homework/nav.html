<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navbar vertical</title>
    <style>
      * {
        padding: 0;
        margin: 0;
      }
      #horizontal-nav {
        font-family: Arial, Helvetica, sans-serif;
        gap: 10px;
        padding: 10px;
        background-color: rgb(16, 85, 109);
        display: flex;
        justify-content: space-around;
        align-items: center;
      }
      #vertical-nav {
        display: grid;
        justify-items: center;
        align-items: center;
        height: 100vh;
        width: 100px;
        font-family: Arial, Helvetica, sans-serif;
        background-color: rgb(16, 85, 109);
      }
      nav > div {
        width: 100%;
        text-align: center;
      }
      nav > div > a:hover {
        color: rgb(155, 215, 236);
      }
      nav > div > a,
      nav > div > a:visited {
        font-size: 1.1rem;
        display: block;
        text-decoration: none;
        color: whitesmoke;
      }
    </style>
  </head>
  <body>
    <nav id="horizontal-nav">
      <div><a href="#">Home</a></div>
      <div><a href="#">Contact us</a></div>
      <div><a href="#">Sign in</a></div>
      <div><a href="#">Sign out</a></div>
    </nav>

      <div><a href="#">Sign out</a></div>
    </nav> -->
  
  
  </body>
</html>
